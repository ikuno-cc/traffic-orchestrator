services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      - SUPABASE_PROJECT_REF=${SUPABASE_PROJECT_REF}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
      - SUPABASE_SCHEMA=${SUPABASE_SCHEMA:-public}
      - SUPABASE_SERVICES_TABLE=${SUPABASE_SERVICES_TABLE:-orch_services}
      - SUPABASE_REQUESTS_TABLE=${SUPABASE_REQUESTS_TABLE:-orch_requests}
      - APP_EXTERNAL_API_PREFIX=${APP_EXTERNAL_API_PREFIX:-}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      - SUPABASE_PROJECT_REF=${SUPABASE_PROJECT_REF}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
      - SUPABASE_SCHEMA=${SUPABASE_SCHEMA:-public}
      - SUPABASE_SERVICES_TABLE=${SUPABASE_SERVICES_TABLE:-orch_services}
      - SUPABASE_REQUESTS_TABLE=${SUPABASE_REQUESTS_TABLE:-orch_requests}
      - WORKER_POLL_SECONDS=${WORKER_POLL_SECONDS:-1.0}
      - WORKER_CONFIG_REFRESH_SECONDS=${WORKER_CONFIG_REFRESH_SECONDS:-5.0}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  gui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gui
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
