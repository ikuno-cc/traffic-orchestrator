services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      - DATA_BACKEND=${DATA_BACKEND:-postgres}
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-}
      - PG_SCHEMA=${PG_SCHEMA:-public}
      - SERVICES_TABLE=${SERVICES_TABLE:-orch_services}
      - REQUESTS_TABLE=${REQUESTS_TABLE:-orch_requests}
      - APP_EXTERNAL_API_PREFIX=${APP_EXTERNAL_API_PREFIX:-}
    expose:
      - "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      - DATA_BACKEND=${DATA_BACKEND:-postgres}
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-}
      - PG_SCHEMA=${PG_SCHEMA:-public}
      - SERVICES_TABLE=${SERVICES_TABLE:-orch_services}
      - REQUESTS_TABLE=${REQUESTS_TABLE:-orch_requests}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  gui:
    build:
      context: .
      dockerfile: docker/Dockerfile.gui
    expose:
      - "80"
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
