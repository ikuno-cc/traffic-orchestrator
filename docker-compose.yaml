services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REQUEST_RETENTION_HOURS=${REQUEST_RETENTION_HOURS:-5}
      - REQUEST_CLEANUP_INTERVAL_SECONDS=${REQUEST_CLEANUP_INTERVAL_SECONDS:-600}
      - WEBHOOK_DELAY_SECONDS=${WEBHOOK_DELAY_SECONDS:-10}
      - EXTERNAL_API_PREFIX=${EXTERNAL_API_PREFIX:-}
    expose:
      - '8000'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
