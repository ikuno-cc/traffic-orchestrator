services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../app:/app/app
      - ../workers:/app/workers
    restart: unless-stopped
    # Allows containers to reach services on your Windows host via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    env_file:
      - ../.env
    volumes:
      - ../app:/app/app
      - ../workers:/app/workers
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  gui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gui
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
